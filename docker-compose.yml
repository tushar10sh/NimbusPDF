services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
      - ./backend/config:/app/config:ro
    environment:
      NIMBUS_DATA_DIR: /app/data
      NIMBUS_CONFIG_DIR: /app/config
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      ORIGIN: http://localhost:80
    depends_on:
      - backend
    restart: unless-stopped
